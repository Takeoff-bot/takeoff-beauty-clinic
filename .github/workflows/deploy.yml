name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare pages content
        run: |
          mkdir -p site
          cp index.html locations.html providers.html robots.txt script.js services_data.json sitemap.xml styles.css googleee0cd8344157e8f0.html CNAME site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://takeoffbeautyclinic.com
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
